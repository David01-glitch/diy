<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="indian">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>indian</title>
  <link rel="manifest" href="manifest.json">

  <!-- Immediate paint — avoids plain white flash while Flutter bundles load -->
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #000;
      overflow: hidden;
    }
    #flutter-splash {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #6c6c70;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      transition: opacity 0.25s ease-out;
    }
    #flutter-splash .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #222;
      border-top-color: #ff9d00;
      border-radius: 50%;
      animation: flutter-splash-spin 0.9s linear infinite;
    }
    @keyframes flutter-splash-spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-4J046JXWVC"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-4J046JXWVC');
</script>
</head>
<body>
  <div id="flutter-splash" aria-busy="true" aria-live="polite">
    <div class="spinner"></div>
    <p style="margin-top: 18px; font-weight: 500;">Loading…</p>
  </div>

  <script>
    (function () {
      function hideSplash() {
        var el = document.getElementById('flutter-splash');
        if (!el || el.dataset.removed === '1') return;
        el.dataset.removed = '1';
        el.style.opacity = '0';
        setTimeout(function () { try { el.remove(); } catch (e) {} }, 280);
      }
      window.addEventListener('flutter-first-frame', hideSplash);
      window.setTimeout(hideSplash, 25000);
    })();
  </script>

  <script src="flutter_bootstrap.js" defer></script>
</body>
</html>
